<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockSikho — Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 420px; padding: 20px; }
        .logo { color: #00ff9f; font-size: 22px; font-weight: 700; letter-spacing: 4px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .logo-bar { width: 4px; height: 24px; background: #00ff9f; }
        .tagline { font-size: 11px; color: #666; letter-spacing: 1.5px; margin-bottom: 36px; text-transform: uppercase; }
        .card { background: #0f0f0f; border: 1px solid #222; padding: 28px; }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 10px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; background: transparent; border: none; color: #666; cursor: pointer; font-family: 'Courier New', monospace; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
        .tab.active { color: #00ff9f; border-bottom: 2px solid #00ff9f; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 10px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; display: block; font-weight: 700; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #222; font-size: 12px; background: #0a0a0a; color: #e0e0e0; outline: none; font-family: 'Courier New', monospace; transition: border 0.15s; }
        .form-input:focus { border-color: #00ff9f; }
        .btn { width: 100%; padding: 11px; font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; font-family: 'Courier New', monospace; text-transform: uppercase; border: none; background: #00ff9f; color: #0a0a0a; transition: opacity 0.15s; margin-top: 8px; }
        .btn:hover { opacity: 0.85; }
        .alert { padding: 10px 14px; margin-bottom: 16px; font-size: 11px; letter-spacing: 0.5px; border-left: 2px solid; }
        .alert-error { background: #1a0f0f; border-color: #ff4444; color: #ff4444; }
        .alert-success { background: #0f1a0f; border-color: #00ff9f; color: #00ff9f; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <div class="logo-bar"></div>
        STOCKSIKHO
    </div>
    <div class="tagline">Learn investing · Paper trade · Compete with friends</div>
    <div class="card">
        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="showTab('login')">LOGIN</button>
            <button class="tab" id="tab-register" onclick="showTab('register')">REGISTER</button>
        </div>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}
        <div id="form-login">
            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input class="form-input" type="email" name="email" placeholder="you@email.com" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" name="password" placeholder="••••••••" required/>
                </div>
                <button type="submit" class="btn">LOGIN</button>
            </form>
        </div>
        <div id="form-register" class="hidden">
            <form method="POST" action="/register">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input class="form-input" type="text" name="name" placeholder="Your name" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input class="form-input" type="email" name="email" placeholder="you@email.com" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" name="password" placeholder="••••••••" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Age</label>
                    <input class="form-input" type="number" name="age" placeholder="18" min="18" max="100" required/>
                </div>
                <button type="submit" class="btn">CREATE ACCOUNT</button>
            </form>
        </div>
    </div>
</div>
<script>
function showTab(tab) {
    document.getElementById('form-login').className = tab === 'login' ? '' : 'hidden';
    document.getElementById('form-register').className = tab === 'register' ? '' : 'hidden';
    document.getElementById('tab-login').className = 'tab' + (tab === 'login' ? ' active' : '');
    document.getElementById('tab-register').className = 'tab' + (tab === 'register' ? ' active' : '');
}
</script>
</body>
</html>
